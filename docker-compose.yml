services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web

  web:
    build: .
    restart: unless-stopped

  mail:
    image: stalwartlabs/stalwart:latest
    ports:
      - "25:25"       # SMTP
      - "465:465"     # SMTPS
      - "587:587"     # Submission
      - "993:993"     # IMAPS
      - "8443:443"    # Admin/JMAP web UI (mapped to 8443 to avoid Caddy conflict)
    volumes:
      - stalwart_data:/opt/stalwart
    environment:
      - MAIL_DOMAIN=crucifyai.com
      - ADMIN_SECRET=${MAIL_ADMIN_PASSWORD}
    restart: unless-stopped

  webmail:
    image: roundcube/roundcubemail:latest
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://mail
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mail
      - ROUNDCUBEMAIL_SMTP_PORT=587
    depends_on:
      - mail
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  stalwart_data:
